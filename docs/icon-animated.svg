<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#FFFFFF" flood-opacity="0.4"/>
    </filter>

    <style>
      @keyframes float {
        0%, 100% { transform: translate(52px, 52px) scale(17) translateY(0px); }
        50% { transform: translate(52px, 52px) scale(17) translateY(-1.5px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; transform: translate(52px, 52px) scale(17) translate(12px, 12px) scale(0.95) translate(-12px, -12px); }
        50% { opacity: 0.8; transform: translate(52px, 52px) scale(17) translate(12px, 12px) scale(1.05) translate(-12px, -12px); }
      }
      .anim-float { animation: float 4s ease-in-out infinite; }
      .anim-pulse { animation: pulse 3s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <g class="anim-pulse" filter="url(#glow)" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z" />
    <path d="m9 12 2 2 4-4" />
  </g>

  <g class="anim-float" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z" />
    <path d="m9 12 2 2 4-4" />
  </g>
</svg>